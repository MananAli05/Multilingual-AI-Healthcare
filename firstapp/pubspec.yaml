name: MediCare
description: "Medical Symptom Checker for Pakistan"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  csv: ^6.0.0
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  supabase_flutter: ^2.5.0
  sqflite: ^2.3.0
  path: ^1.8.3
  provider: ^6.1.1
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  pinput: ^4.0.0
  intl: ^0.19.0
  crypto: ^3.0.3
  http: ^1.2.0
  image_picker: ^1.0.7
  record: ^6.2.0
  path_provider: ^2.1.2
  flutter_tts: ^4.2.2    # For app to "speak" instructions
  audioplayers: ^6.1.0   # For playing specific audio prompt assets
  url_launcher: ^6.3.0   # For phone dialer links (emergency contacts)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

flutter_native_splash:
  color: "#00478D"
  image: assets/images/icon.png
  android: true
  ios: true
  android_12:
    color: "#00478D"
    image: assets/images/icon.png
  android_gravity: center
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/icon.png
    - assets/data/Updated_Symptom_Description.csv
    - assets/data/Updated_Symptom_Severity.csv
    - assets/data/Updated_Symptom_Precaution.csv
    - assets/data/symptom_questions.json
    - assets/audio/  # User should put instruction audio files here
